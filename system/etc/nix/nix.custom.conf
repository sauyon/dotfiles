# Written by https://github.com/DeterminateSystems/nix-installer.
# Determinate `!include`s this file from /etc/nix/nix.conf. `extra-*` settings
# APPEND to nix's compiled-in defaults (cache.nixos.org, FlakeHub) rather than
# replacing them, so the public caches are preserved.
#
# Managed by dotfiles (system/etc/nix/nix.custom.conf), deployed by system/deploy.
# A Determinate reinstall/repair may overwrite this file; re-run system/deploy.

# Self-hosted attic binary cache on the kube cluster.
# The cache is PRIVATE: the read-only pull token is not here — it lives in
# /etc/determinate/netrc.custom (referenced from /etc/determinate/config.json),
# rendered from sops at deploy time. The signing key below is public, not secret.
extra-substituters = https://attic.ko.ag/kube
extra-trusted-public-keys = kube:YLRejBKnIVKqvZRXBvFR4KmosPZPg9phiM+pRlhbQ+c=

# Remote builder: delegate aarch64-darwin derivations to mari (the only darwin
# machine) over Tailscale. The nix daemon (root) SSHes as sauyon using the key
# rendered to /etc/nix/mari-builder-key (from sops, by system/deploy). The last
# field pins mari-1's host key. mari authorizes this builder key for the dedicated
# `nixremote` user and exempts it from the OIDC ForceCommand gate via a Match block
# (see flake.nix darwinConfigurations.mari) — deploy there first.
# Pinned to mari-1's stable Tailscale IP, not its MagicDNS name: root's resolver
# here has no *.ts.net, and the Tailscale IP is stable per node.
# Connects as `nixremote` (NOT sauyon): the gate ForceCommand would hijack a
# sauyon-user non-interactive build; the nixremote Match carve-out bypasses it.
builders = ssh-ng://nixremote@100.106.204.103 aarch64-darwin /etc/nix/mari-builder-key 4 1 - - c3NoLWVkMjU1MTkgQUFBQUMzTnphQzFsWkRJMU5URTVBQUFBSUJ4am9mQVZnbHZoZXRlZzdxdjljNEVUbHNpRVI3azhQSmNkN3lNTDVPWTI=
builders-use-substitutes = true
