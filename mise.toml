[tools]
aws = { version = "latest", symlink_bins = "true" }
fnox = "latest"
helm = "latest"
"vfox:sauyon/vfox-kcs" = "latest"
usage = "latest"
uv = "0.11.2"
gcloud = "latest"
sops = "latest"
python = "3.12"

[settings]
experimental = true

[tasks.gcp-setup]
description = "Setup GCP KMS and Service Account for sops-nix"
run = '''
#!/usr/bin/env bash
set -euo pipefail

PROJECT="sauyon-dotfiles"
LOCATION="global"
KEYRING="nix-keyring"
KEY="nix-key"
SA_NAME="nix-secret-manager"
SA_EMAIL="${SA_NAME}@${PROJECT}.iam.gserviceaccount.com"
KEY_PATH="$HOME/.config/sops/gcp-key.json"

gcloud services enable secretmanager.googleapis.com cloudkms.googleapis.com --project="$PROJECT"
gcloud kms keyrings create "$KEYRING" --location="$LOCATION" --project="$PROJECT" 2>/dev/null || true
gcloud kms keys create "$KEY" --keyring="$KEYRING" --location="$LOCATION" --purpose=encryption --project="$PROJECT" 2>/dev/null || true
gcloud iam service-accounts create "$SA_NAME" --display-name="Nix sops-nix Secret Access" --project="$PROJECT" 2>/dev/null || true

gcloud kms keys add-iam-policy-binding "$KEY" \
    --keyring="$KEYRING" --location="$LOCATION" \
    --member="serviceAccount:$SA_EMAIL" \
    --role="roles/cloudkms.cryptoKeyEncrypterDecrypter" --project="$PROJECT"

gcloud projects add-iam-policy-binding "$PROJECT" \
    --member="serviceAccount:$SA_EMAIL" \
    --role="roles/secretmanager.secretAccessor"

mkdir -p "$(dirname "$KEY_PATH")"
gcloud iam service-accounts keys create "$KEY_PATH" \
    --iam-account="$SA_EMAIL" --project="$PROJECT"
'''

[tasks.sops]
description = "Run sops with GCP credentials"
run = 'GOOGLE_APPLICATION_CREDENTIALS="$HOME/.config/sops/gcp-key.json" sops "$@"'

[tasks.sops-fix]
description = "Fix sops-nix Docker-created root-owned directories and restart"
run = '''
#!/usr/bin/env bash
set -euo pipefail

# sops-nix templates that Docker may have clobbered with root-owned directories
paths=(
  "$HOME/.config/litellm/config.yaml"
)

needs_fix=false
for p in "${paths[@]}"; do
  if [ -d "$p" ]; then
    echo "fixing root-owned directory: $p"
    needs_fix=true
  fi
done

if [ "$needs_fix" = true ]; then
  for p in "${paths[@]}"; do
    if [ -d "$p" ]; then
      sudo rm -rf "$p"
      mkdir -p "$(dirname "$p")"
    fi
  done
fi

systemctl --user restart sops-nix
systemctl --user status sops-nix --no-pager || true
'''

[tasks.sops-restart]
description = "Restart sops-nix, fixing Docker path conflicts first"
depends = ["sops-fix"]

[tasks.hms]
description = "Apply home-manager configuration from this flake"
run = '''
#!/usr/bin/env bash
set -euo pipefail
case "$(uname -s)" in
  Darwin) config="sauyon@darwin" ;;
  *)      config="sauyon" ;;
esac
exec home-manager switch --flake "$HOME/devel/dotfiles#$config" "$@"
'''
