---
"editor_view:move_to_line_start": ctrl-a
"editor_view:select_all": ctrl-shift-A
"editor_view:move_to_line_end": ctrl-e
"editor_view:right": ctrl-f
"editor_view:left": ctrl-b
"editor_view:delete": ctrl-d
"editor_view:move_forward_one_word": alt-f
"editor_view:move_backward_one_word": alt-b
"editor_view:cut_word_right": alt-d
"editor_view:cut_word_left": ctrl-w
"editor_view:cut_all_right": ctrl-k
"editor_view:delete_word_left": alt-backspace

# Mac-style Cmd (Super) bindings
"workspace:new_tab": super-t
"workspace:new_window": super-n
"workspace:close_active_tab": super-w
"workspace:close_window": "super-shift-W"
"app:reopen_closed_session": "super-shift-T"
"pane_group:add_right": super-d
"pane_group:add_down": "super-shift-D"
"pane_group:toggle_maximize_pane": super-shift-enter
"pane_group:navigate_left": super-alt-left
"pane_group:navigate_right": super-alt-right
"pane_group:navigate_up": super-alt-up
"pane_group:navigate_down": super-alt-down
"workspace:activate_first_tab": super-1
"workspace:activate_second_tab": super-2
"workspace:activate_third_tab": super-3
"workspace:activate_fourth_tab": super-4
"workspace:activate_fifth_tab": super-5
"workspace:activate_sixth_tab": super-6
"workspace:activate_seventh_tab": super-7
"workspace:activate_eighth_tab": super-8
"workspace:activate_last_tab": super-9
"workspace:activate_next_tab": "super-shift-]"
"workspace:activate_prev_tab": "super-shift-["
"terminal:find": super-f
"find:find_next_occurrence": super-g
"find:find_prev_occurrence": "super-shift-G"
"workspace:show_command_search": super-p
"workspace:show_settings": "super-,"
"workspace:increase_font_size": "super-="
"workspace:decrease_font_size": "meta--"
"workspace:reset_font_size": super-0
"terminal:copy": super-c
"terminal:paste": super-v
"terminal:clear_blocks": super-k
"workspace:quit_warp": super-q
"workspace:minimize": super-m
