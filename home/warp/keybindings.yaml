---
"editor_view:move_to_line_start": ctrl-a
"editor_view:select_all": ctrl-shift-A
"editor_view:move_to_line_end": ctrl-e
"editor_view:right": ctrl-f
"editor_view:left": ctrl-b
"editor_view:delete": ctrl-d
"editor_view:move_forward_one_word": alt-f
"editor_view:move_backward_one_word": alt-b
"editor_view:cut_word_right": alt-d
"editor_view:cut_word_left": ctrl-w
"editor_view:cut_all_right": ctrl-k
"editor_view:delete_word_left": alt-backspace

# Mac-style Cmd (Super) bindings
"workspace:new_tab": cmd-t
"workspace:new_window": cmd-n
"workspace:close_active_tab": cmd-w
"workspace:close_window": "cmd-shift-W"
"app:reopen_closed_session": "cmd-shift-T"
"pane_group:add_right": cmd-d
"pane_group:add_down": "cmd-shift-D"
"pane_group:toggle_maximize_pane": cmd-shift-enter
"pane_group:navigate_left": cmd-alt-left
"pane_group:navigate_right": cmd-alt-right
"pane_group:navigate_up": cmd-alt-up
"pane_group:navigate_down": cmd-alt-down
"workspace:activate_first_tab": cmd-1
"workspace:activate_second_tab": cmd-2
"workspace:activate_third_tab": cmd-3
"workspace:activate_fourth_tab": cmd-4
"workspace:activate_fifth_tab": cmd-5
"workspace:activate_sixth_tab": cmd-6
"workspace:activate_seventh_tab": cmd-7
"workspace:activate_eighth_tab": cmd-8
"workspace:activate_last_tab": cmd-9
"workspace:activate_next_tab": "cmd-shift-]"
"workspace:activate_prev_tab": "cmd-shift-["
"terminal:find": cmd-f
"find:find_next_occurrence": cmd-g
"find:find_prev_occurrence": "cmd-shift-G"
"workspace:show_command_search": cmd-p
"workspace:show_settings": "cmd-,"
"workspace:increase_font_size": "cmd-="
"workspace:decrease_font_size": "cmd--"
"workspace:reset_font_size": cmd-0
"terminal:copy": cmd-c
"terminal:paste": cmd-v
"terminal:clear_blocks": cmd-k
"workspace:quit_warp": cmd-q
"workspace:minimize": cmd-m
